<div class="masonry-with-columns">

    <section>
        <ng-container *ngFor="let post of posts">

                <div [routerLink]="[post.slug]" class="box">
                    <img [src]="post.featureImage" alt="Cover Image">
                    <div class="content">
                        <h2>{{post.title}}</h2>
                    </div>
                </div>
                
        </ng-container>
    </section>

</div>
